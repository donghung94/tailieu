  <!-- 🔐 Kiểm tra đăng nhập -->
<script type="module">
    import { auth, db } from "./firebase.js"; 
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            location.href = "login.html";
        } else {
            try {
                const userDocRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userDocRef);

                if (userSnap.exists()) {
                    const data = userSnap.data();
                    const isPremium = data.isPremium === true; // Kiểm tra quyền Premium
                    const currentDeviceId = localStorage.getItem('my_device_id');
                    const devices = data.devices || {};

                    // 1. KIỂM TRA THIẾT BỊ
                    if (data.device_count >= 1 && !devices[currentDeviceId]) {
                        alert("🚫 Thiết bị không hợp lệ hoặc đã bị đổi. Bạn sẽ bị đăng xuất.");
                        await signOut(auth);
                        location.href = "login.html";
                        return;
                    }

                    // 2. LOGIC CHẶN TRUY CẬP PREMIUM
                    const urlParams = new URLSearchParams(window.location.search);
                    const setNum = urlParams.get('set');
                    const practice = urlParams.get('practice');
                    
                    // Danh sách cho phép: questions.js (set=1), questions2.js (set=2), questions3.js (set=3)
                    const allowedSets = ['1', '2', '3']; 

                    if (!isPremium) {
                        // Nếu truy cập các set > 3 HOẶC bất kỳ bài thi thử/thực hành nào (practice)
                        if ((setNum && !allowedSets.includes(setNum)) || practice || setNum === 'randomExam') {
                            
                            // Hiển thị Modal khóa
                            const modal = document.getElementById('premium-modal');
                            if (modal) {
                                modal.style.display = 'flex';
                                // Ẩn nội dung câu hỏi để học viên không nhìn thấy phía sau
                                document.querySelector('main.container').style.display = 'none';
                                document.getElementById('timer').innerText = "🔒 Khóa";
                            }
                            return; // Dừng không cho chạy code load câu hỏi ở exam.js
                        }
                    }

                    // 3. HIỂN THỊ TÊN (Nếu hợp lệ)
                    const nameDisplay = document.getElementById('user-display-name');
                    if (nameDisplay) {
                        nameDisplay.innerText = data.name || "Học viên";
                    }

                } else {
                    console.warn("Không tìm thấy dữ liệu học viên.");
                }
            } catch (error) {
                console.error("Lỗi xác thực tại trang thi:", error);
            }
        }
    });
</script>
